<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADT Móvil | Contacto</title>
<style>
  :root {
    --azul: #0d3b8c;
    --azul-claro: #2196f3;
    --negro: #0a0a0a;
    --blanco: #ffffff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(160deg, var(--negro) 0%, var(--azul) 55%, var(--azul-claro) 100%);
    padding: 24px;
  }
  .card {
    background: var(--blanco);
    width: 100%;
    max-width: 380px;
    border-radius: 24px;
    padding: 36px 28px 32px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.45);
  }
  .logo {
    width: 170px;
    max-width: 70%;
    height: auto;
    margin: 0 auto 18px;
    display: block;
  }
  h1 {
    color: var(--negro);
    font-size: 20px;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  p.subtitle {
    color: #555;
    font-size: 14px;
    margin-bottom: 28px;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 15px 18px;
    margin-bottom: 16px;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
    color: var(--blanco);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn svg { width: 22px; height: 22px; flex-shrink: 0; }
  .btn-whatsapp {
    background: var(--negro);
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  }
  .btn-instagram {
    background: linear-gradient(135deg, var(--azul) 0%, var(--azul-claro) 100%);
    box-shadow: 0 8px 20px rgba(13,59,140,0.35);
  }
  footer {
    margin-top: 22px;
    font-size: 11px;
    color: #999;
    letter-spacing: 0.5px;
  }
</style>
</head>
